type Query {
  findBestEleven(teamId: Int!): [BestElevenModel!]!
  findInviteCode(code: String!): InviteCodeModel
  findInviteCodeByTeam(teamId: Int!): InviteCodeModel
  findManyInviteCode(limit: Int! = 10, offset: Int! = 0): InviteCodeArrayModel!
  findManyMatches(limit: Int! = 10, offset: Int! = 0): [MatchModel!]!
  findManyRegion(keyword: String!): RegionSearchArrayModel!
  findManyTeam(limit: Int! = 10, offset: Int! = 0): TeamArrayModel!
  findManyTeamMember(limit: Int! = 10, offset: Int! = 0, teamId: Int!): TeamMemberArrayModel!

  """유저 목록을 조회합니다. 페이지네이션을 지원합니다."""
  findManyUser(limit: Int! = 10, offset: Int! = 0): UserArrayModel!
  findMatch(createdTeamId: Int!): [MatchModel!]!
  findMatchAttendance(matchId: Int!, teamId: Int!): [MatchAttendanceModel!]!

  """확정된 매치 포메이션 조회 (isDraft=false)"""
  findMatchFormation(matchId: Int!, teamId: Int!): [MatchFormationModel!]!

  """MOM 투표 결과 조회. 해당 매치의 후보별 득표 수를 득표 순으로 반환합니다."""
  findMatchMom(matchId: Int!, teamId: Int!): [MatchMomVoteResultModel!]!

  """본인의 팀 가입 신청 이력을 조회합니다. 모든 상태(pending/approved/rejected)가 포함됩니다."""
  findMyJoinRequest: [JoinRequestModel!]!

  """내가 해당 경기에 투표한 MOM 목록을 조회합니다."""
  findMyMatchMom(matchId: Int!): [MatchMomVoteModel!]!
  findTeam(name: String!): TeamModel

  """초대코드로 팀 정보를 조회합니다"""
  findTeamByInviteCode(
    """팀 초대코드"""
    inviteCode: String!
  ): TeamModel

  """팀에 온 가입 신청 이력을 조회합니다. status를 지정하면 해당 상태만, 없으면 전체 상태를 조회합니다."""
  findTeamJoinRequest(status: JoinRequestStatus, teamId: Int!): [JoinRequestModel!]!
  findTeamMember: [TeamMemberModel!]!

  """이메일로 유저를 조회합니다."""
  findUser(email: String!): UserModel!

  """ID로 유저를 조회합니다."""
  findUserById(id: Int!): UserModel!

  """경기별 용병 목록 조회"""
  matchMercenaries(
    """경기 ID"""
    matchId: Int!
  ): [MatchMercenaryModel!]!
  searchTeamMember(name: String!, teamId: Int!): [TeamMemberModel!]!
}

