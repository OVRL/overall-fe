type Mutation {
  """본인의 팀 가입 신청을 취소합니다. PENDING 상태의 신청만 취소 가능합니다."""
  cancelJoinRequest(joinRequestId: Int!): Boolean!

  """임시저장 포메이션 확정 (선택한 draft 승격, 기존 확정본 덮어쓰기, 나머지 draft 삭제)"""
  confirmMatchFormation(draftId: Int!): MatchFormationModel!

  """베스트 일레븐 등록 (전술 정보 JSON 포함)"""
  createBestEleven(input: CreateBestElevenInput!): BestElevenModel!
  createInviteCode(teamId: Float!): CreateInviteCodeModel!
  createMatch(input: CreateMatchInput!): MatchModel!
  createMatchAttendance(input: CreateMatchAttendanceInput!): MatchAttendanceModel!

  """매치 포메이션 생성 (isDraft=false 확정 상태로 저장)"""
  createMatchFormation(input: CreateMatchFormationInput!): MatchFormationModel!

  """용병 추가 (코치/감독 전용)"""
  createMatchMercenary(input: AddMatchMercenaryInput!): MatchMercenaryModel!

  """
  MOM 투표. 매치 종료 후 24시간 이내, 해당 매치에 참석(ATTEND)한 팀 멤버만 투표 가능합니다. 최대 3명까지 투표 가능.
  """
  createMatchMom(input: CreateMatchMomVoteInput!): [MatchMomVoteModel!]!
  createTeam(emblem: Upload, input: CreateTeamInput!): TeamModel!
  createTeamMember(input: JoinTeamInput!): TeamMemberModel!
  deleteBestEleven(id: Int!): Boolean!
  deleteMatch(id: Int!): Boolean!
  deleteMatchAttendance(id: Int!, teamId: Int!): MatchAttendanceModel!

  """용병 삭제 (코치/감독 전용)"""
  deleteMatchMercenary(input: DeleteMatchMercenaryInput!): Boolean!
  deleteTeam(id: Int!): Boolean!
  deleteTeamMember(id: Int!): Boolean!

  """유저를 삭제합니다. (JWT 인증 필요)"""
  deleteUser(id: Int!): Boolean!

  """이메일과 비밀번호로 로그인합니다. Access Token과 Refresh Token을 반환합니다."""
  login(email: String!, password: String!): LoginResponseModel!

  """로그아웃합니다. Refresh Token을 무효화합니다. (JWT 인증 필요)"""
  logout(refreshToken: String!): Boolean!

  """Refresh Token으로 새로운 Access Token과 Refresh Token을 발급받습니다."""
  refresh(refreshToken: String!): LoginResponseModel!

  """
  회원가입을 진행합니다. 프론트엔드 SDK로 받은 소셜 로그인 정보를 전달받아 회원가입을 완료합니다. 토큰은 tokens 필드를 요청하여 조회할 수 있습니다.
  """
  registerUser(input: RegisterUserInput!, profileImage: Upload): UserModel!

  """팀 가입 신청을 거절합니다. PENDING 상태의 신청만 거절 가능하며, 신청 이력은 유지됩니다."""
  rejectJoinRequest(joinRequestId: Int!, rejectedReason: String): JoinRequestModel!
  removeBackground(image: Upload!): BackgroundRemovalModel!

  """초대 코드를 입력하여 팀 가입을 신청합니다. 관리자의 승인이 필요합니다."""
  requestJoinTeam(input: RequestJoinTeamInput!): JoinRequestModel!

  """매치 포메이션 임시저장 (새 draft 레코드 생성)"""
  saveMatchFormationDraft(input: SaveMatchFormationDraftInput!): MatchFormationModel!

  """
  소셜 로그인을 진행합니다. 프론트엔드 SDK로 받은 이메일과 액세스 토큰을 전달하면 회원 검증 후 UserModel을 반환합니다.
  tokens 필드를 요청하여 JWT 토큰을 조회할 수 있습니다. 회원이 아닐 경우 예외가 발생하여 회원가입으로 유도합니다.
  """
  socialLogin(input: SocialLoginInput!): UserModel!
  updateMatch(input: UpdateMatchInput!): MatchModel!
  updateMatchAttendance(input: UpdateMatchAttendanceInput!): MatchAttendanceModel!

  """매치 포메이션 전술 수정"""
  updateMatchFormation(input: UpdateMatchFormationInput!): MatchFormationModel!

  """
  MOM 투표 수정. 투표 마감(vote_deadline) 이전에 본인의 투표만 수정 가능합니다. 기존 투표를 삭제하고 새로 생성합니다.
  """
  updateMatchMom(input: UpdateMatchMomVoteInput!): [MatchMomVoteModel!]!
  updateTeam(emblem: Upload, input: UpdateTeamInput!): TeamModel!
  updateTeamMember(input: UpdateTeamMemberInput!, profileImage: Upload): TeamMemberModel!

  """유저 정보를 수정합니다. 프로필 이미지 업로드를 지원합니다."""
  updateUser(input: UpdateUserInput!, profileImage: Upload): UserModel!
}

