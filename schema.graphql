"""
Indicates exactly one field must be supplied and this field must not be `null`.
"""
directive @oneOf on INPUT_OBJECT

"""Exposes a URL that specifies the behavior of this scalar."""
directive @specifiedBy(
  """The URL that specifies the behavior of this scalar."""
  url: String!
) on SCALAR

type BackgroundRemovalModel {
  image: String!
}

type CreateInviteCodeModel {
  code: String!
  createdAt: DateTime!
  expiredAt: DateTime!
  id: Float!
  teamId: Float!
}

input CreateTeamInput {
  activityArea: String!
  description: String
  historyStartDate: DateTime!
  name: String!
}

"""
A date string, such as 2007-12-03, compliant with the `full-date` format
outlined in section 5.6 of the RFC 3339 profile of the ISO 8601 standard for
representation of dates and times using the Gregorian calendar.
"""
scalar Date

"""
A date-time string at UTC, such as 2019-12-03T09:54:33Z, compliant with the date-time format.
"""
scalar DateTime

"""주발"""
enum Foot {
  B
  L
  R
}

"""성별"""
enum Gender {
  M
  W
}

type InviteCodeArrayModel {
  hasNextPage: Boolean!
  items: [InviteCodeModel!]!
  totalCount: Int!
}

type InviteCodeModel {
  code: String!
  createdAt: DateTime!
  expiredAt: DateTime!
  id: Float!
  team: TeamModel!
  teamId: Float!
}

type LoginResponseModel {
  accessToken: String
  activityArea: String
  birthDate: String
  deviceInfo: String
  email: String!
  favoritePlayer: String
  foot: Foot
  gender: Gender
  id: ID!
  mainPosition: Position
  name: String
  phone: String
  preferredNumber: Float
  profileImage: String
  provider: String
  refreshToken: String
  region: RegionSearchModel
  subPositions: [Position!]
}

type Mutation {
  createInviteCode(teamId: Float!): CreateInviteCodeModel!
  createTeam(emblem: Upload!, input: CreateTeamInput!): TeamModel!
  deleteTeam(id: Int!): Boolean!
  login(email: String!, password: String!): LoginResponseModel!
  logout(refreshToken: String!): Boolean!
  refresh(refreshToken: String!): LoginResponseModel!
  removeBackground(image: Upload!): BackgroundRemovalModel!
  updateTeam(emblem: Upload, input: UpdateTeamInput!): TeamModel!
  updateUser(input: UpdateUserInput!, profileImage: Upload!): UserModel!
}

"""축구 포지션 목록"""
enum Position {
  CAM
  CB
  CDM
  CF
  CM
  DF
  FW
  GK
  LAM
  LB
  LCAM
  LCB
  LCM
  LDM
  LF
  LM
  LS
  LW
  LWB
  MF
  RAM
  RB
  RCAM
  RCB
  RCM
  RDM
  RF
  RM
  RS
  RW
  RWB
  ST
  SW
}

type Query {
  findInviteCode(code: String!): InviteCodeModel
  findInviteCodeByTeam(teamId: Int!): InviteCodeModel
  findManyInviteCode(limit: Int! = 10, offset: Int! = 0): InviteCodeArrayModel!
  findManyRegion(keyword: String!): RegionSearchArrayModel!
  findManyTeam(limit: Int! = 10, offset: Int! = 0): TeamArrayModel!
  findManyUser(limit: Int! = 10, offset: Int! = 0): UserArrayModel!
  findTeam(id: Int!): TeamModel!
  findUser(email: String!): UserModel!
}

type RegionSearchArrayModel {
  hasNextPage: Boolean!
  items: [RegionSearchModel!]!
  totalCount: Int!
}

type RegionSearchModel {
  code: String!
  dongName: String
  name: String!
  riName: String
  sidoName: String!
  siggName: String
}

type TeamArrayModel {
  hasNextPage: Boolean!
  items: [TeamModel!]!
  totalCount: Int!
}

type TeamModel {
  activityArea: String
  description: String
  emblem: String
  historyStartDate: Date
  id: ID!
  name: String
  region: RegionSearchModel
}

input UpdateTeamInput {
  activityArea: String
  description: String
  historyStartDate: Date
  id: Int!
  name: String
}

input UpdateUserInput {
  activityArea: String
  birthDate: String
  favoritePlayer: String
  foot: Foot
  gender: Gender
  id: Float!
  mainPosition: Position
  name: String!
  password: String
  phone: String!
  preferredNumber: Float
  provider: String
  subPositions: [Position!]
}

"""The `Upload` scalar type represents a file upload."""
scalar Upload

type UserArrayModel {
  hasNextPage: Boolean!
  items: [UserModel!]!
  totalCount: Int!
}

type UserModel {
  activityArea: String
  birthDate: String
  email: String!
  favoritePlayer: String
  foot: Foot
  gender: Gender
  id: ID!
  mainPosition: Position
  name: String
  phone: String
  preferredNumber: Float
  profileImage: String
  provider: String
  region: RegionSearchModel
  subPositions: [Position!]
  tokens: [UserTokenModel!]
}

type UserTokenModel {
  accessToken: String
  createdAt: DateTime!
  deviceInfo: String
  id: ID!
  refreshToken: String
  updatedAt: DateTime!
  userId: Float!
}

