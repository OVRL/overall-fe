# 모노레포 전체를 개인 미러 원격으로 동기화합니다.
# 트리거는 apps/web/ 변경 시에만이지만, 실행 시에는 항상 저장소 전체를 미러로 푸시합니다.
# GitHub Actions는 저장소 루트의 .github/workflows 만 인식하므로 apps/web 아래가 아닌 여기에 둡니다.
name: Mirror to Personal Repo

on:
  push:
    branches: [main, develop]
    paths:
      - "apps/web/**"

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Push to Mirror
        env:
          TARGET_REPO: ${{ secrets.MIRROR_REMOTE_URL }}
          USERNAME: ${{ secrets.MIRROR_USERNAME }}
          TOKEN: ${{ secrets.MIRROR_TOKEN }}
        run: |
          CLEAN_URL="${TARGET_REPO#https://}"
          git remote add mirror "https://${USERNAME}:${TOKEN}@${CLEAN_URL}"
          git push --tags --force --prune mirror "refs/remotes/origin/*:refs/heads/*"
